<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduQuiz Pro - Sistem Evaluasi Digital Modern</title>
    <meta name="description" content="Platform evaluasi pembelajaran digital interaktif dengan desain modern dan analisis performa instan." />
  </head>
  <body>
    <div id="root">
      <div id="splash" style="position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#F8FAFC;font-family:sans-serif;z-index:9999;">
        <div style="color:#4F46E5;font-weight:900;font-size:1.5rem;letter-spacing:0.2em;margin-bottom:1rem;">EDUQUIZ PRO</div>
        <div style="color:#94A3B8;font-size:0.75rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;">Memuat Sistem...</div>
        <button id="bypass" style="display:none;margin-top:20px;padding:10px 20px;background:#4F46E5;color:white;border:none;border-radius:8px;font-size:12px;font-weight:bold;cursor:pointer;" onclick="this.parentElement.remove()">Lewati Loading</button>
      </div>
    </div>
    <script>
      setTimeout(function() {
        var bypass = document.getElementById('bypass');
        if (bypass) bypass.style.display = 'block';
      }, 5000);
    </script>

    <noscript>
      <div style="padding: 20px; text-align: center; color: red; font-weight: bold;">
        Aplikasi ini memerlukan JavaScript untuk berjalan.
      </div>
    </noscript>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        console.error('Critical Error:', msg, 'at', url, 'line', lineNo);
        var errDiv = document.createElement('div');
        errDiv.style.cssText = 'position:fixed;bottom:10px;left:10px;right:10px;background:rgba(220,38,38,0.95);color:white;padding:15px;font-size:12px;z-index:99999;border-radius:8px;font-family:sans-serif;box-shadow:0 10px 15px -3px rgba(0,0,0,0.1);';
        errDiv.innerHTML = '<div style="font-weight:bold;margin-bottom:4px;">System Failure: ' + msg + '</div><div style="opacity:0.8;font-size:10px;">' + url + ':' + lineNo + '</div>';
        document.body.appendChild(errDiv);
      };
    </script>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
