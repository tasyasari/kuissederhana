<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduQuiz Pro - Sistem Evaluasi Digital Modern</title>
    <meta name="description" content="Platform evaluasi pembelajaran digital interaktif dengan desain modern dan analisis performa instan." />
  </head>
  <body>
    <div id="root">
      <div id="splash" style="position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#F8FAFC;font-family:sans-serif;z-index:9999;">
        <div style="color:#4F46E5;font-weight:900;font-size:1.5rem;letter-spacing:0.2em;margin-bottom:1rem;">EDUQUIZ PRO</div>
        <div style="color:#94A3B8;font-size:0.75rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;">Memuat Sistem...</div>
      </div>
    </div>
    <noscript>
      <div style="padding: 20px; text-align: center; color: red; font-weight: bold;">
        Aplikasi ini memerlukan JavaScript untuk berjalan.
      </div>
    </noscript>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        console.log('Loader Error:', msg);
        var errDiv = document.createElement('div');
        errDiv.style.cssText = 'position:fixed;bottom:10px;left:10px;background:rgba(0,0,0,0.8);color:white;padding:10px;font-size:10px;z-index:99999;';
        errDiv.innerText = 'System Error: ' + msg;
        document.body.appendChild(errDiv);
      };
    </script>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
